<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La 100 - Chivilcoy</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 80% 50%, #180808 0%, #0a0202 40%, #000000 70%);
      overflow: hidden;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    .logo {
      width: 220px;
      height: 220px;
      opacity: 0;
      animation:
        logoFadeIn 0.6s ease-out 0.2s forwards,
        logoSpin   4.5s cubic-bezier(0.05, 0.0, 0.12, 1.0) 0.2s forwards;
    }

    .tagline {
      color: #ffffff;
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(-18px);
      animation: fadeInDown 1s cubic-bezier(0.22, 0.61, 0.36, 1) 5.2s forwards;
      text-shadow: 0 0 40px rgba(228, 23, 35, 0.25);
    }

    @keyframes logoFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes logoSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(2160deg); }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="center">
    <img src="logo.svg" alt="La 100 Chivilcoy" class="logo">
    <p class="tagline">La 100 &mdash; Chivilcoy</p>
  </div>
</body>
</html>
